server {
    listen 80;
    server_name localhost;

    location = / {
        return 301 /app-reclamos/;
    }

    location /v1/api/ {
        proxy_pass         http://backend:8080/v1/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    root /usr/share/nginx/html;

    location /swagger-ui/ {
        proxy_pass         http://backend:8080/swagger-ui/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /v3/api-docs {
        proxy_pass         http://backend:8080/v3/api-docs;
        proxy_set_header   Host $host;
    }

    location /swagger-ui.html {
        proxy_pass         http://backend:8080/swagger-ui.html;
        proxy_set_header   Host $host;
    }

    location /app-reclamos/ {
        alias /usr/share/nginx/html/app-reclamos/;
        index index.html;
        try_files $uri $uri/ /app-reclamos/index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}